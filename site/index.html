<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ROADTO.PL</title>
  <meta name="description" content="ROADTO.PL — materiały przygotowujące do wyjazdów trekkingowych i wypraw.">
  <style>
    :root {
      --bg: #f5f1e8;
      --card: #ffffff;
      --text: #1f1f1f;
      --muted: #68645c;
      --border: #ded6c7;
      --accent: #2f5d50;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 32px 20px;
    }

    .wrap {
      width: 100%;
      max-width: 1040px;
      margin: 0 auto;
    }

    .brand {
      font-weight: 800;
      letter-spacing: .04em;
      margin-bottom: 28px;
    }

    .hero {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: clamp(28px, 6vw, 56px);
      box-shadow: 0 18px 54px rgba(0,0,0,.05);
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(42px, 8vw, 86px);
      line-height: 1;
      letter-spacing: -0.06em;
    }

    p {
      max-width: 720px;
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 19px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    a.button {
      display: inline-block;
      color: white;
      background: var(--accent);
      text-decoration: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
    }

    a.secondary {
      display: inline-block;
      color: var(--accent);
      background: white;
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
    }
  </style>
  <link rel="stylesheet" href="/assets/css/roadto-brand.css">
</head>
<body>
  <div class="page">
    <div class="wrap">
      <div class="brand">ROADTO.PL</div>

      <main class="hero">
        <h1>ROADTO.PL</h1>
        <p>
          Materiały przygotowujące do wyjazdów trekkingowych i wypraw.
          Aktualnie dostępny jest dział Kilimandżaro.
        </p>

        <div class="actions">
          <a class="button" href="/kilimandzaro/">Przejdź do Kilimandżaro</a>
          <a class="secondary" href="/kilimandzaro/trasy/">Zobacz trasy</a>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
