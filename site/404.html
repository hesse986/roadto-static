<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nie znaleziono strony — ROADTO.PL</title>
  <meta name="description" content="Nie znaleziono strony ROADTO.PL.">
  <style>
    :root {
      --bg: #f5f1e8;
      --card: #ffffff;
      --text: #1f1f1f;
      --muted: #68645c;
      --border: #ded6c7;
      --accent: #2f5d50;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 32px 20px;
    }

    .wrap {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: clamp(28px, 6vw, 52px);
      box-shadow: 0 18px 54px rgba(0,0,0,.05);
    }

    .brand {
      font-weight: 800;
      letter-spacing: .04em;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(34px, 7vw, 68px);
      line-height: 1.05;
      letter-spacing: -0.05em;
    }

    p {
      margin: 0 0 26px;
      color: var(--muted);
      font-size: 18px;
    }

    .links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    a {
      display: inline-block;
      color: var(--accent);
      background: white;
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
    }

    a.primary {
      color: white;
      background: var(--accent);
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="wrap">
      <main class="card">
        <div class="brand">ROADTO.PL</div>
        <h1>Nie znaleziono strony</h1>
        <p>
          Ten adres nie istnieje albo został zmieniony. Wróć do głównego działu
          Kilimandżaro albo wybierz jedną z najważniejszych sekcji.
        </p>

        <div class="links">
          <a class="primary" href="/kilimandzaro/">Kilimandżaro</a>
          <a href="/kilimandzaro/trasy/">Trasy</a>
          <a href="/kilimandzaro/sprzet/">Sprzęt</a>
          <a href="/kilimandzaro/trening/">Trening</a>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
